name: AI Data Updater

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions cron UTC calisir. 01:00 UTC, 8 Nisan 2026 itibariyla
    # Europe/Berlin saat diliminde Pazar 03:00'e denk gelir (yaz saati doneminde).
    - cron: '0 1 * * 0'

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AI updater
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          OFFICIAL_SOURCE_URL: ${{ secrets.OFFICIAL_SOURCE_URL }}
          OFFICIAL_SOURCE_URLS: ${{ secrets.OFFICIAL_SOURCE_URLS }}
        run: python update_data.py

      - name: Commit and push changes
        run: |
          if git diff --quiet -- data.json; then
            echo "No changes detected in data.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: refresh certificate data"
          git push
